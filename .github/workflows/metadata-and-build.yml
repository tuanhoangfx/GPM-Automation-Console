name: Metadata and Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync docs and metadata
        run: pnpm sync:all

      - name: Ensure synced files are committed
        run: git diff --exit-code -- CHANGELOG.md tool.manifest.json TOOL_STATUS.md

      - name: Cleanup audit
        run: pnpm audit:cleanup

      - name: Build
        run: pnpm build
